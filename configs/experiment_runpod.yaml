experiment:
  name: "minecraft_farming_building_agent_v2"
  description: "Full GPU training - farming, animals, construction"
  version: "2.0.0"
  seed: 42

environment:
  minecraft_version: "1.19.4"
  obs_size: [128, 128]
  max_episode_steps: 36000
  n_parallel_envs: 4          # 4 envs on A100

curriculum:
  stages:
    - name: "survival_basics"
      max_steps: 6000
      tasks: ["collect_wood", "craft_tools", "find_food"]
    - name: "farming_intro"
      max_steps: 12000
      tasks: ["till_soil", "plant_seeds", "harvest_crops"]
    - name: "animal_farming"
      max_steps: 18000
      tasks: ["find_animals", "build_enclosure", "breed_animals"]
    - name: "construction"
      max_steps: 36000
      tasks: ["gather_materials", "build_walls", "add_roof", "place_bed"]

training:
  algorithm: "PPO"
  total_steps: 2000000
  batch_size: 256             # larger batch on GPU
  learning_rate: 0.00003      # lower LR for fine-tuning
  clip_range: 0.2
  n_epochs: 4
  gamma: 0.999               # higher gamma = care more about future
  gae_lambda: 0.95
  checkpoint_interval: 25000  # more frequent checkpoints on GPU
  eval_interval: 10000

llm:
  provider: "openai"
  model: "gpt-4o-mini"
  max_tokens: 300
  call_interval: 200          # steps between LLM calls

logging:
  wandb_project: "minecraft-agent-research"
  log_interval: 50            # more frequent logging on GPU
  video_interval: 2000
  save_trajectories: true
