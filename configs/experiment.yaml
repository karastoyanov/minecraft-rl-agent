experiment:
  name: "minecraft_farming_building_agent_v1"
  description: "Autonomous agent for farming, animal husbandry and house building"
  version: "1.0.0"
  seed: 42

environment:
  minecraft_version: "1.19.4"
  obs_size: [128, 128]
  max_episode_steps: 36000   # 30mins / 20 FPS
  n_parallel_envs: 2         # nr of paralel envs

curriculum:
  stages:
    - name: "survival_basics"
      max_steps: 6000
      tasks: ["collect_wood", "craft_tools", "find_food"]
    - name: "farming_intro"
      max_steps: 12000
      tasks: ["till_soil", "plant_seeds", "harvest_crops"]
    - name: "animal_farming"
      max_steps: 18000
      tasks: ["find_animals", "build_enclosure", "breed_animals"]
    - name: "construction"
      max_steps: 36000
      tasks: ["gather_materials", "build_walls", "add_roof", "place_bed"]

training:
  algorithm: "PPO"
  total_steps: 2_000_000
  batch_size: 64
  learning_rate: 0.0001
  clip_range: 0.2
  n_epochs: 4
  gamma: 0.99
  gae_lambda: 0.95
  checkpoint_interval: 50000
  eval_interval: 25000

llm:
  provider: "openai"
  model: "gpt-4o-mini"
  max_tokens: 256

logging:
  wandb_project: "minecraft-agent-research"
  log_interval: 100
  video_interval: 5000
  save_trajectories: true
